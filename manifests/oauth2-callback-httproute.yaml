apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-callback
  namespace: default
spec:
  parentRefs:
    - name: longwood
      namespace: default
  hostnames:
    - "longwood.daphnai.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2/callback
      backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80
