apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meerkat
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jthetzel/meerkat
    path: manifests
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
