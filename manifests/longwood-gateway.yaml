apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: longwood
  namespace: default
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: longwood.daphnai.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: longwood-daphnai-com-tls
      allowedRoutes:
        namespaces:
          from: Same
